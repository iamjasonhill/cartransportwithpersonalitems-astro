<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800');</style>
    <pattern id="sgrid" x="0" y="0" width="70" height="70" patternUnits="userSpaceOnUse">
      <line x1="70" y1="0" x2="70" y2="70" stroke="#f0b429" stroke-width="0.4" opacity="0.07"/>
      <line x1="0" y1="70" x2="70" y2="70" stroke="#f0b429" stroke-width="0.4" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1050" fill="#07111f"/>
  <rect width="1400" height="1050" fill="url(#sgrid)"/>

  <!-- Top amber cap -->
  <rect x="0" y="0" width="1400" height="6" fill="#f0b429"/>

  <!-- Left panel bg -->
  <rect x="0" y="6" width="686" height="1044" fill="#07111f"/>
  <!-- Right panel bg -->
  <rect x="714" y="6" width="686" height="1044" fill="#0d1e35"/>
  <!-- Center divider line (amber) -->
  <rect x="693" y="6" width="4" height="1044" fill="#f0b429" opacity="0.4"/>
  <!-- Midpoint dot -->
  <circle cx="695" cy="525" r="8" fill="#f0b429"/>
  <circle cx="695" cy="525" r="16" fill="none" stroke="#f0b429" stroke-width="1.5" opacity="0.4"/>

  <!-- ===== LEFT PANEL: CAR TRANSPORT SERVICE ===== -->
  <!-- Panel label -->
  <rect x="60" y="72" width="24" height="4" fill="#f0b429"/>
  <text x="96" y="82" font-family="'Syne', 'Arial Black', sans-serif" font-size="12"
        fill="#f0b429" letter-spacing="5">VEHICLE TRANSPORT</text>

  <!-- Panel heading -->
  <text x="60" y="150" font-family="'Syne', 'Arial Black', sans-serif" font-size="56"
        font-weight="800" fill="#f4f7fc" letter-spacing="-1">WE MOVE</text>
  <text x="60" y="216" font-family="'Syne', 'Arial Black', sans-serif" font-size="56"
        font-weight="800" fill="#f0b429" letter-spacing="-1">YOUR CAR.</text>

  <!-- Car illustration — left panel center -->
  <!-- Car body -->
  <rect x="80" y="360" width="520" height="130" fill="#e8edf5" opacity="0.9"/>
  <!-- Car cabin -->
  <polygon points="148,360 222,284 458,284 532,360" fill="#f0b429" opacity="0.92"/>
  <!-- Rear window -->
  <polygon points="164,356 222,296 276,296 276,356" fill="#07111f" opacity="0.6"/>
  <!-- Front window -->
  <polygon points="356,356 356,296 408,296 496,356" fill="#07111f" opacity="0.6"/>
  <!-- Car body stripe -->
  <rect x="80" y="454" width="520" height="7" fill="#f0b429" opacity="0.5"/>
  <!-- Rear wheel -->
  <circle cx="196" cy="510" r="58" fill="#07111f"/>
  <circle cx="196" cy="510" r="38" fill="#1a2e42"/>
  <circle cx="196" cy="510" r="18" fill="#f0b429"/>
  <!-- Front wheel -->
  <circle cx="484" cy="510" r="58" fill="#07111f"/>
  <circle cx="484" cy="510" r="38" fill="#1a2e42"/>
  <circle cx="484" cy="510" r="18" fill="#f0b429"/>

  <!-- Ground line -->
  <rect x="60" y="562" width="580" height="2" fill="#f0b429" opacity="0.3"/>

  <!-- Motion lines -->
  <line x1="24" y1="390" x2="68" y2="390" stroke="#f0b429" stroke-width="5" opacity="0.7" stroke-linecap="square"/>
  <line x1="14" y1="420" x2="68" y2="420" stroke="#f0b429" stroke-width="5" opacity="0.45" stroke-linecap="square"/>
  <line x1="24" y1="450" x2="68" y2="450" stroke="#f0b429" stroke-width="5" opacity="0.22" stroke-linecap="square"/>
  <!-- Arrow indicating movement right -->
  <line x1="88" y1="620" x2="578" y2="620" stroke="#f0b429" stroke-width="2" opacity="0.35"/>
  <polygon points="578,612 598,620 578,628" fill="#f0b429" opacity="0.35"/>

  <!-- Feature bullets — left -->
  <rect x="60" y="680" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="88" y="694" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">ENCLOSED &amp; OPEN CARRIER</text>
  <rect x="60" y="724" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="88" y="738" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">DOOR-TO-DOOR PICKUP</text>
  <rect x="60" y="768" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="88" y="782" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">REAL-TIME TRACKING</text>
  <rect x="60" y="812" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="88" y="826" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">FULLY INSURED</text>

  <!-- ===== RIGHT PANEL: PERSONAL ITEMS SERVICE ===== -->
  <!-- Panel label -->
  <rect x="754" y="72" width="24" height="4" fill="#f0b429"/>
  <text x="790" y="82" font-family="'Syne', 'Arial Black', sans-serif" font-size="12"
        fill="#f0b429" letter-spacing="5">PERSONAL ITEMS</text>

  <!-- Panel heading -->
  <text x="754" y="150" font-family="'Syne', 'Arial Black', sans-serif" font-size="56"
        font-weight="800" fill="#f4f7fc" letter-spacing="-1">WE PACK</text>
  <text x="754" y="216" font-family="'Syne', 'Arial Black', sans-serif" font-size="56"
        font-weight="800" fill="#f0b429" letter-spacing="-1">YOUR LIFE.</text>

  <!-- Boxes illustration — right panel -->
  <!-- Large box (back left) -->
  <rect x="754" y="330" width="190" height="178" fill="#1a2e42"/>
  <rect x="756" y="332" width="186" height="174" fill="#0f2035" opacity="0.5"/>
  <rect x="754" y="330" width="190" height="7" fill="#f0b429" opacity="0.75"/>
  <rect x="754" y="330" width="7" height="178" fill="#f0b429" opacity="0.4"/>
  <!-- Cross tape on big box -->
  <line x1="754" y1="330" x2="944" y2="508" stroke="#f0b429" stroke-width="2.5" opacity="0.2"/>
  <line x1="944" y1="330" x2="754" y2="508" stroke="#f0b429" stroke-width="2.5" opacity="0.2"/>
  <text x="849" y="428" font-family="'Syne', 'Arial Black', sans-serif" font-size="10"
        fill="#f0b429" text-anchor="middle" opacity="0.4" letter-spacing="3">FRAGILE</text>
  <!-- Handle -->
  <rect x="830" y="326" width="60" height="8" fill="#f0b429" opacity="0.6"/>

  <!-- Medium box (back right) -->
  <rect x="964" y="368" width="160" height="140" fill="#1a2e42"/>
  <rect x="966" y="370" width="156" height="136" fill="#0f2035" opacity="0.5"/>
  <rect x="964" y="368" width="160" height="6" fill="#f0b429" opacity="0.7"/>
  <rect x="964" y="368" width="6" height="140" fill="#f0b429" opacity="0.35"/>
  <rect x="1020" y="364" width="48" height="7" fill="#f0b429" opacity="0.55"/>

  <!-- Front boxes row -->
  <!-- Box A -->
  <rect x="754" y="508" width="120" height="110" fill="#1a2e42"/>
  <rect x="756" y="510" width="116" height="106" fill="#0f2035" opacity="0.5"/>
  <rect x="754" y="508" width="120" height="6" fill="#f0b429" opacity="0.7"/>
  <rect x="800" y="504" width="28" height="7" fill="#f0b429" opacity="0.55"/>

  <!-- Box B -->
  <rect x="884" y="508" width="120" height="110" fill="#1a2e42"/>
  <rect x="886" y="510" width="116" height="106" fill="#0f2035" opacity="0.5"/>
  <rect x="884" y="508" width="120" height="6" fill="#f0b429" opacity="0.7"/>
  <rect x="930" y="504" width="28" height="7" fill="#f0b429" opacity="0.55"/>
  <text x="944" y="570" font-family="'Syne', 'Arial Black', sans-serif" font-size="9"
        fill="#f0b429" text-anchor="middle" opacity="0.35" letter-spacing="2">BOOKS</text>

  <!-- Box C -->
  <rect x="1014" y="508" width="110" height="110" fill="#1a2e42"/>
  <rect x="1016" y="510" width="106" height="106" fill="#0f2035" opacity="0.5"/>
  <rect x="1014" y="508" width="110" height="6" fill="#f0b429" opacity="0.7"/>

  <!-- Box D (small top) -->
  <rect x="1134" y="440" width="86" height="78" fill="#1a2e42"/>
  <rect x="1136" y="442" width="82" height="74" fill="#0f2035" opacity="0.5"/>
  <rect x="1134" y="440" width="86" height="5" fill="#f0b429" opacity="0.65"/>

  <!-- Ground line -->
  <rect x="734" y="618" width="620" height="2" fill="#f0b429" opacity="0.3"/>

  <!-- Capacity indicator bar -->
  <rect x="754" y="650" width="560" height="4" fill="#1a2e42"/>
  <rect x="754" y="650" width="392" height="4" fill="#f0b429" opacity="0.6"/>
  <text x="754" y="674" font-family="'Syne', 'Arial Black', sans-serif" font-size="11"
        fill="#f0b429" letter-spacing="3" opacity="0.6">70% CAPACITY — ADD MORE ITEMS</text>

  <!-- Feature bullets — right -->
  <rect x="754" y="710" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="782" y="724" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">UP TO 100KG PER VEHICLE</text>
  <rect x="754" y="754" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="782" y="768" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">PACKED SAFELY IN YOUR CAR</text>
  <rect x="754" y="798" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="782" y="812" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">ITEMISED INVENTORY LIST</text>
  <rect x="754" y="842" width="16" height="16" fill="#f0b429" opacity="0.9"/>
  <text x="782" y="856" font-family="'Syne', 'Arial Black', sans-serif" font-size="15"
        font-weight="700" fill="#e8edf5" letter-spacing="1">INCLUDED IN EVERY BOOKING</text>

  <!-- ===== BOTTOM CTA BAND ===== -->
  <rect x="0" y="940" width="1400" height="110" fill="#f0b429"/>
  <text x="700" y="1006" font-family="'Syne', 'Arial Black', sans-serif" font-size="32"
        font-weight="800" fill="#07111f" text-anchor="middle" letter-spacing="-0.5">BOOK ONLINE IN UNDER 3 MINUTES</text>
  <rect x="540" y="1022" width="320" height="2" fill="#07111f" opacity="0.25"/>
  <text x="700" y="1044" font-family="'Syne', 'Arial Black', sans-serif" font-size="13"
        font-weight="700" fill="#07111f" text-anchor="middle" letter-spacing="4" opacity="0.6">INSTANT QUOTE · NO CREDIT CARD REQUIRED</text>
</svg>
