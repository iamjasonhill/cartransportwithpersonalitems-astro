<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@800');</style>
  </defs>
  <rect width="640" height="640" fill="#07111f"/>

  <!-- Amber corner accent — top left -->
  <rect x="0" y="0" width="80" height="6" fill="#f0b429"/>
  <rect x="0" y="0" width="6" height="80" fill="#f0b429"/>

  <!-- Ground line -->
  <rect x="60" y="440" width="520" height="3" fill="#f0b429" opacity="0.35"/>

  <!-- === TRANSPORT CARRIER TRUCK === -->
  <!-- Trailer bed -->
  <rect x="100" y="400" width="440" height="20" fill="#1a2e42"/>
  <rect x="100" y="400" width="440" height="5" fill="#f0b429" opacity="0.5"/>
  <!-- Trailer frame uprights -->
  <rect x="108" y="350" width="8" height="50" fill="#2a3e55"/>
  <rect x="524" y="350" width="8" height="50" fill="#2a3e55"/>
  <!-- Trailer wheels -->
  <circle cx="170" cy="438" r="32" fill="#0d1e35"/>
  <circle cx="170" cy="438" r="20" fill="#1a2e42"/>
  <circle cx="170" cy="438" r="10" fill="#f0b429" opacity="0.8"/>
  <circle cx="250" cy="438" r="32" fill="#0d1e35"/>
  <circle cx="250" cy="438" r="20" fill="#1a2e42"/>
  <circle cx="250" cy="438" r="10" fill="#f0b429" opacity="0.8"/>
  <!-- Truck cab -->
  <rect x="480" y="340" width="100" height="80" fill="#1a2e42"/>
  <rect x="482" y="342" width="96" height="50" fill="#0f2035"/>
  <!-- Cab windows -->
  <rect x="492" y="350" width="76" height="36" fill="#07111f"/>
  <rect x="494" y="352" width="72" height="32" fill="#0d1e35" opacity="0.7"/>
  <!-- Cab amber accent stripe -->
  <rect x="480" y="390" width="100" height="5" fill="#f0b429"/>
  <!-- Cab wheels -->
  <circle cx="490" cy="438" r="32" fill="#0d1e35"/>
  <circle cx="490" cy="438" r="20" fill="#1a2e42"/>
  <circle cx="490" cy="438" r="10" fill="#f0b429" opacity="0.8"/>
  <circle cx="560" cy="438" r="32" fill="#0d1e35"/>
  <circle cx="560" cy="438" r="20" fill="#1a2e42"/>
  <circle cx="560" cy="438" r="10" fill="#f0b429" opacity="0.8"/>

  <!-- === CAR ON CARRIER === -->
  <!-- Car body -->
  <rect x="130" y="340" width="330" height="85" fill="#e8edf5" opacity="0.9"/>
  <!-- Car cabin -->
  <polygon points="178,340 228,282 362,282 412,340" fill="#f0b429" opacity="0.95"/>
  <!-- Rear window -->
  <polygon points="192,336 228,292 264,292 264,336" fill="#07111f" opacity="0.65"/>
  <!-- Front window -->
  <polygon points="324,336 324,292 356,292 402,336" fill="#07111f" opacity="0.65"/>
  <!-- Car amber body stripe -->
  <rect x="130" y="392" width="330" height="6" fill="#f0b429" opacity="0.55"/>
  <!-- Car rear wheel -->
  <circle cx="210" cy="418" r="34" fill="#07111f"/>
  <circle cx="210" cy="418" r="22" fill="#1a2e42"/>
  <circle cx="210" cy="418" r="11" fill="#f0b429"/>
  <!-- Car front wheel -->
  <circle cx="380" cy="418" r="34" fill="#07111f"/>
  <circle cx="380" cy="418" r="22" fill="#1a2e42"/>
  <circle cx="380" cy="418" r="11" fill="#f0b429"/>

  <!-- === PERSONAL ITEMS — boxes in/on car === -->
  <!-- Box 1 (visible in rear window area) -->
  <rect x="270" y="296" width="40" height="32" fill="#f0b429" opacity="0.45"/>
  <line x1="270" y1="312" x2="310" y2="312" stroke="#07111f" stroke-width="1.5" opacity="0.5"/>
  <line x1="290" y1="296" x2="290" y2="328" stroke="#07111f" stroke-width="1.5" opacity="0.5"/>
  <!-- Box handle -->
  <rect x="279" y="293" width="22" height="4" fill="#f0b429" opacity="0.7"/>

  <!-- Motion lines — left of truck -->
  <line x1="44" y1="360" x2="90" y2="360" stroke="#f0b429" stroke-width="4" opacity="0.7" stroke-linecap="square"/>
  <line x1="32" y1="382" x2="90" y2="382" stroke="#f0b429" stroke-width="4" opacity="0.4" stroke-linecap="square"/>
  <line x1="54" y1="404" x2="90" y2="404" stroke="#f0b429" stroke-width="4" opacity="0.2" stroke-linecap="square"/>

  <!-- Top amber rule -->
  <rect x="60" y="130" width="520" height="2" fill="#f0b429" opacity="0.2"/>

  <!-- Brand text area (bottom) -->
  <text x="320" y="530" font-family="'Syne', 'Arial Black', sans-serif" font-size="36" font-weight="800"
        fill="#e8edf5" text-anchor="middle" letter-spacing="8">CAR TRANSPORT</text>
  <text x="320" y="564" font-family="'Syne', 'Arial Black', sans-serif" font-size="14" font-weight="500"
        fill="#f0b429" text-anchor="middle" letter-spacing="5">WITH PERSONAL ITEMS</text>

  <!-- Bottom amber rule -->
  <rect x="60" y="580" width="520" height="2" fill="#f0b429" opacity="0.4"/>
</svg>
