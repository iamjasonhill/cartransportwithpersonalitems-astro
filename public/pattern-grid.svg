<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1800">
  <rect width="1800" height="1800" fill="#07111f"/>
  <defs>
    <!-- Grid tile pattern -->
    <pattern id="grid" x="0" y="0" width="90" height="90" patternUnits="userSpaceOnUse">
      <rect width="90" height="90" fill="none"/>
      <line x1="90" y1="0" x2="90" y2="90" stroke="#f0b429" stroke-width="0.5" opacity="0.12"/>
      <line x1="0" y1="90" x2="90" y2="90" stroke="#f0b429" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="90" height="90" patternUnits="userSpaceOnUse">
      <circle cx="45" cy="45" r="1.5" fill="#f0b429" opacity="0.2"/>
    </pattern>
    <!-- Car silhouette tile -->
    <pattern id="cars" x="0" y="0" width="360" height="270" patternUnits="userSpaceOnUse">
      <!-- Mini car outline -->
      <rect x="40" y="120" width="168" height="52" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.08"/>
      <polygon points="62,120 86,95 174,95 190,120" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.08"/>
      <circle cx="74" cy="174" r="16" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.08"/>
      <circle cx="182" cy="174" r="16" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.08"/>
      <!-- Arrow right -->
      <line x1="220" y1="135" x2="260" y2="135" stroke="#f0b429" stroke-width="1.5" opacity="0.12"/>
      <polygon points="260,129 272,135 260,141" fill="#f0b429" opacity="0.12"/>
      <!-- Mini box -->
      <rect x="40" y="20" width="30" height="28" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.08"/>
      <line x1="40" y1="34" x2="70" y2="34" stroke="#f0b429" stroke-width="0.8" opacity="0.08"/>
      <rect x="90" y="20" width="30" height="28" fill="none" stroke="#f0b429" stroke-width="1" opacity="0.08"/>
    </pattern>
    <!-- Road lines pattern -->
    <pattern id="roads" x="0" y="0" width="180" height="60" patternUnits="userSpaceOnUse">
      <line x1="0" y1="30" x2="60" y2="30" stroke="#f0b429" stroke-width="1.5" opacity="0.06" stroke-dasharray="40,20"/>
    </pattern>
  </defs>

  <!-- Base grid -->
  <rect width="1800" height="1800" fill="url(#grid)"/>
  <!-- Dots at intersections -->
  <rect width="1800" height="1800" fill="url(#dots)"/>
  <!-- Scattered car tiles -->
  <rect width="1800" height="1800" fill="url(#cars)"/>
  <!-- Road stripe overlay -->
  <rect width="1800" height="1800" fill="url(#roads)"/>

  <!-- Diagonal accent lines — sparse -->
  <line x1="0" y1="600" x2="600" y2="0" stroke="#f0b429" stroke-width="1" opacity="0.06"/>
  <line x1="600" y1="1800" x2="1800" y2="600" stroke="#f0b429" stroke-width="1" opacity="0.06"/>
  <line x1="0" y1="1200" x2="1200" y2="0" stroke="#f0b429" stroke-width="0.8" opacity="0.04"/>
  <line x1="900" y1="1800" x2="1800" y2="900" stroke="#f0b429" stroke-width="0.8" opacity="0.04"/>

  <!-- Sparse amber glow squares at grid intersections -->
  <rect x="360" y="360" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="720" y="720" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="1080" y="360" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="360" y="1080" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="1080" y="1080" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="1440" y="720" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="720" y="1440" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="1440" y="1440" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="0" y="900" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="900" y="0" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="1800" y="900" width="4" height="4" fill="#f0b429" opacity="0.35"/>
  <rect x="900" y="1800" width="4" height="4" fill="#f0b429" opacity="0.35"/>
</svg>
